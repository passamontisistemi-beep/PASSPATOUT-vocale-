<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nuova Toponomastica Aumentata</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial,sans-serif;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  top:20px;
  left:20px;
  z-index:1000;
  width:360px;
  max-width:calc(100% - 40px);
  background:rgba(255,255,255,.96);
  padding:18px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,.25);
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#eef4ff;
  color:#0a66ff;
  font-size:12px;
  margin-bottom:8px;
}
h1{margin:0 0 10px;font-size:24px;color:#111}
.small{font-size:14px;color:#444;line-height:1.45}
.btn{
  width:100%;
  margin-top:12px;
  border:none;
  background:#0a66ff;
  color:#fff;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* Goccia rossa utente */
.user-drop{
  width:28px;
  height:28px;
  background:#e53935;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2px solid #fff;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  position:relative;
}
.user-drop::after{
  content:'';
  width:10px;
  height:10px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:7px;
  left:7px;
}
.user-label{
  margin-top:6px;
  background:#e53935;
  color:#fff;
  padding:2px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:bold;
  white-space:nowrap;
}

/* Goccia blu POI */
.poi-drop{
  width:26px;
  height:26px;
  background:#0a66ff;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2px solid #fff;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  position:relative;
}
.poi-drop::after{
  content:'';
  width:9px;
  height:9px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:6px;
  left:6px;
}
.poi-label{
  margin-top:6px;
  background:#0a66ff;
  color:#fff;
  padding:2px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:bold;
  white-space:nowrap;
}
.marker-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}
</style>
</head>
<body>

<div class="panel" id="welcomePanel">
  <div class="badge">Toponomastica Aumentata</div>
  <h1 id="streetTitle">Via della Città</h1>
  <div class="small">
    Hai scansionato il QR della via.<br><br>
    Autorizzami il rilievo della tua posizione per mostrarti la mappa e i punti di interesse vicini.
  </div>
  <button class="btn" onclick="startApp()">Autorizza posizione</button>
</div>

<div id="map"></div>

<script>
let map;
let userPos=[39.2238,9.1217];

const params=new URLSearchParams(window.location.search);
const street=params.get("street") || "Via della Città";
document.getElementById("streetTitle").innerText=street;

function startApp(){
  document.getElementById("welcomePanel").style.display="none";

  if(!navigator.geolocation){
    initMap();
    loadPOI();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){
      userPos=[pos.coords.latitude,pos.coords.longitude];
      initMap();
      loadPOI();
    },
    function(){
      initMap();
      loadPOI();
    }
  );
}

function initMap(){

  map=L.map("map").setView(userPos,16);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:20}
  ).addTo(map);

  const userIcon=L.divIcon({
    className:"",
    html:
      '<div class="marker-wrap">'+
      '<div class="user-drop"></div>'+
      '<div class="user-label">Tu sei qui</div>'+
      '</div>',
    iconSize:[90,58],
    iconAnchor:[45,58]
  });

  L.marker(userPos,{icon:userIcon}).addTo(map);
}

async function loadPOI(){

  try{
    const url=
      "https://it.wikipedia.org/w/api.php?action=query&list=geosearch"+
      "&gscoord="+userPos[0]+"|"+userPos[1]+
      "&gsradius=3000&gslimit=20&format=json&origin=*";

    const res=await fetch(url);
    const data=await res.json();

    data.query.geosearch.forEach(poi=>{

      const poiPos=[poi.lat,poi.lon];

      const distance=Math.round(
        map.distance(userPos,poiPos)
      );

      const walk=Math.max(1,Math.round(distance/80));

      const lines=["1","5","6","7","8","M","PF","QS"];
      const l1=lines[Math.floor(Math.random()*lines.length)];
      const l2=lines[Math.floor(Math.random()*lines.length)];
      const ctm=l1===l2?l1:l1+", "+l2;

      const poiIcon=L.divIcon({
        className:"",
        html:
          '<div class="marker-wrap">'+
          '<div class="poi-drop"></div>'+
          '<div class="poi-label">'+poi.title+'</div>'+
          '</div>',
        iconSize:[130,56],
        iconAnchor:[65,56]
      });

      L.marker(poiPos,{icon:poiIcon})
        .addTo(map)
        .bindPopup(
          "<b>"+poi.title+"</b><br>"+
          "🚌 CTM: "+ctm+"<br>"+
          "🚶 "+walk+" min a piedi<br><br>"+
          "<button onclick=\"openWiki('"+
          encodeURIComponent(poi.title)+
          "')\">Apri Wikipedia</button>"
        );

    });

  }catch(e){}
}

function openWiki(title){
  window.open(
    "https://it.wikipedia.org/wiki/"+title,
    "_blank"
  );
}
</script>

</body>
</html>
